services:
  # ---------------------------------------------------------
  # Picstome Application (Laravel + Vite)
  # ---------------------------------------------------------
  picstome-app:
    build: .
    container_name: picstome_local
    ports:
      - "8091:8000" # Access the application at http://localhost:8091
      - "5173:5173" # Exposed for Vite asset delivery and hot-reloading
    environment:
      - COMPOSER_AUTH=${COMPOSER_AUTH:-}
    volumes:
      - ./:/app
    networks:
      - picstome-net

  # ---------------------------------------------------------
  # MinIO Storage (Local S3)
  # ---------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio_s3
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API endpoint
      - "9001:9001" # Access the MinIO Web Console at http://localhost:9001
    environment:
      MINIO_ROOT_USER: generic_user
      MINIO_ROOT_PASSWORD: generic_password
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    volumes:
      - minio_data:/data
    networks:
      - picstome-net
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO S3 to start...';
      until mc alias set localminio http://minio:9000 generic_user generic_password; do
        sleep 2;
      done;
      echo 'MinIO is up. Creating bucket...';
      mc mb localminio/picstome-galleries --ignore-existing;
      echo 'Setting public download policy...';
      mc anonymous set download localminio/picstome-galleries;
      echo 'MinIO setup complete.';
      exit 0;
      "


  # ---------------------------------------------------------
  # Mailpit (Outbound Local SMTP)
  # ---------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit_smtp
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP server listening port
      - "8025:8025" # Access Mailpit dashboard at http://localhost:8025
    volumes:
      - mailpit_data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - picstome-net

# ---------------------------------------------------------
# Persistent Storage Volumes
# ---------------------------------------------------------
volumes:
  minio_data:
  mailpit_data:

# ---------------------------------------------------------
# Network Isolation
# ---------------------------------------------------------
networks:
  picstome-net:
    driver: bridge
